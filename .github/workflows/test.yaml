name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Unit Tests
        run: python -m pytest

  functional-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      - name: Install Dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Functional Tests
        run: python -m pytest -c pytest-functional.ini